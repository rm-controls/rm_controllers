#!/usr/bin/env python3
PACKAGE = "rm_chassis_controllers"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

gen.add("velocity_coeff",  double_t, 0, "velocity coefficient for power limit",  0.0, 0.0, 100.0)
gen.add("effort_coeff",    double_t, 0, "effort coefficient for power limit",     0.0, 0.0, 100.0)
gen.add("power_offset",    double_t, 0, "power offset for power limit",           0.0, 0.0, 100.0)

exit(gen.generate(PACKAGE, "chassis_controller", "PowerLimit"))